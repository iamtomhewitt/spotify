service: spotify
frameworkVersion: '3'
useDotenv: true

provider:
  lambdaHashingVersion: 20201221
  name: aws
  region: eu-west-1
  runtime: nodejs24.x
  stage: api
  timeout: 30
  environment:
    SPOTIFY_CLIENT_ID: ${env:SPOTIFY_CLIENT_ID}
    SPOTIFY_CLIENT_SECRET: ${env:SPOTIFY_CLIENT_SECRET}
    SPOTIFY_REFRESH_TOKEN: ${env:SPOTIFY_REFRESH_TOKEN}

package:
  patterns:
    - '!**'
    - dist/**
    - node_modules/**

functions:
  topItems:
    description: Get my spotify top items
    events:
      - http:
          cors: true
          method: get
          path: /top-items
    handler: dist/src/lambdas/top-items.handler
    logRetentionInDays: 7
    name: spotify-top-items
    role:
      Fn::GetAtt:
        - LambdaRole
        - Arn

resources:
  Resources:
    LambdaRole:
      Properties:
        AssumeRolePolicyDocument:
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
          Version: '2012-10-17'
        Policies:
          - PolicyDocument:
              Statement:
                - Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Effect: Allow
                  Resource: '*'
              Version: '2012-10-17'
            PolicyName: SpotifyBucketAccess
        RoleName: spotify-lambda-role
      Type: AWS::IAM::Role